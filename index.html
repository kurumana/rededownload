<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta Video Downloader</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 50px; background: #f0f0f0; }
    input { width: 80%; max-width: 500px; padding: 15px; font-size: 18px; }
    button { padding: 15px 30px; font-size: 18px; margin: 20px; }
    #result { margin-top: 30px; }
  </style>
</head>
<body>
  <h1>Baixar Vídeo do Instagram</h1>
  <p>Cole o link do Reel/Post:</p>
  <input type="text" id="url" placeholder="https://www.instagram.com/reel/..." />
  <br>
  <button onclick="baixarVideo()">Baixar</button>

  <div id="result"></div>

  <script>
    async function baixarVideo() {
      const urlInput = document.getElementById('url').value.trim();
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = "Processando...";

      if (!urlInput.includes('instagram.com')) {
        resultDiv.innerHTML = "Link inválido!";
        return;
      }

      try {
        // Exemplos de APIs públicas (testar qual está funcionando)
        const apis = [
          `https://api.instagram.com/oembed?url=${encodeURIComponent(urlInput)}`, // só metadata
          `https://instagram-downloader-api.example.com/download?url=${encodeURIComponent(urlInput)}` // substitua por uma real
        ];

        // Aqui você pode usar um serviço gratuito como:
        // - https://dlpanda.com (ou similares)
        // - Ou criar sua própria Netlify Function

        resultDiv.innerHTML = `
          <p>Como o Instagram bloqueia direto no navegador, recomendo usar um serviço como:</p>
          <a href="https://dlpanda.com" target="_blank">DLPanda</a> ou 
          <a href="https://snapinsta.app" target="_blank">SnapInsta</a><br><br>
          <strong>Ou vamos criar uma Netlify Function juntos.</strong>
        `;
      } catch (e) {
        resultDiv.innerHTML = "Erro ao processar.";
      }
    }
  </script>
</body>
</html>
