<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insta Downloader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #1e3a8a, #7e22ce); }
  </style>
</head>
<body class="min-h-screen text-white">
  <div class="max-w-xl mx-auto pt-20 px-4">
    <h1 class="text-4xl font-bold text-center mb-2">📥 Insta Video Downloader</h1>
    <p class="text-center mb-8">Baixe Reels e Vídeos do Instagram facilmente</p>

    <div class="bg-white/10 backdrop-blur-lg p-8 rounded-2xl shadow-xl">
      <input 
        type="text" 
        id="urlInput"
        placeholder="Cole o link do Reel ou Post aqui..."
        class="w-full p-4 rounded-xl bg-white/20 border border-white/30 focus:outline-none focus:border-white text-lg"
      >
      <button 
        onclick="baixar()"
        class="mt-6 w-full bg-pink-600 hover:bg-pink-700 py-4 rounded-xl font-semibold text-lg transition">
        Baixar Vídeo
      </button>

      <div id="result" class="mt-8"></div>
    </div>

    <p class="text-center text-xs mt-8 opacity-70">
      Funciona melhor em Reels públicos • Sem login necessário
    </p>
  </div>

  <script>
    async function baixar() {
      const url = document.getElementById('urlInput').value.trim();
      const result = document.getElementById('result');
      
      if (!url) return alert("Cole um link!");

      result.innerHTML = `<p class="text-center">🔄 Processando...</p>`;

      try {
        const res = await fetch(`/.netlify/functions/download?url=${encodeURIComponent(url)}`);
        const data = await res.json();

        if (data.success) {
          result.innerHTML = `
            <div class="bg-green-500/20 p-6 rounded-xl text-center">
              <p class="mb-4">✅ Vídeo encontrado!</p>
              <a href="${data.downloadUrl}" 
                 target="_blank"
                 class="inline-block bg-white text-black font-bold px-8 py-3 rounded-xl hover:bg-gray-200">
                ⬇️ Baixar Agora
              </a>
            </div>
          `;
        } else {
          result.innerHTML = `<p class="text-red-400 text-center">${data.error}</p>`;
        }
      } catch (e) {
        result.innerHTML = `<p class="text-red-400">Erro de conexão. Tente novamente.</p>`;
      }
    }
  </script>
</body>
</html>
