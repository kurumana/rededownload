<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kwai Downloader - Sem Marca d'Água</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
    .card { background: rgba(255,255,255,0.95); }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div class="max-w-lg w-full card rounded-3xl shadow-2xl p-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-blue-600">Kwai Downloader</h1>
      <p class="text-gray-600 mt-2">Baixe vídeos sem marca d'água</p>
    </div>

    <div class="space-y-4">
      <input 
        type="text" 
        id="urlInput"
        placeholder="Cole o link do Kwai aqui..."
        class="w-full px-5 py-4 rounded-2xl border border-gray-300 focus:outline-none focus:border-blue-500 text-lg"
      >
      
      <button 
        onclick="baixarVideo()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl text-xl transition flex items-center justify-center gap-3"
      >
        <i class="fas fa-download"></i>
        BAIXAR VÍDEO
      </button>
    </div>

    <div id="resultado" class="mt-6"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
